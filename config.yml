baseURL: "https://iaziz786.com/"
languageCode: en-us
title: Mohammad Aziz
theme: terminal
favicon: "images/favicon.svg"
enableRobotsTXT: true

mediaTypes:
  text/plain:
    suffixes:
      - "txt"
  text/markdown:
    suffixes:
      - "md"

outputFormats:
  llms:
    mediaType: "text/plain"
    baseName: "llms"
    isPlainText: true
    notAlternative: true
  llmsfull:
    mediaType: "text/plain"
    baseName: "llms-full"
    isPlainText: true
    notAlternative: true
  markdown:
    mediaType: "text/markdown"
    baseName: "index"
    isPlainText: true

params:
  socialIcons:
    - name: "x.com"
      url: "https://x.com/iAziz786"
    - name: "github"
      url: "https://github.com/iAziz786"
    - name: "linkedin"
      url: "https://www.linkedin.com/in/iAziz786"

outputs:
  home:
    - HTML
    - RSS
    - JSON
    - llms
    - llmsfull
  page:
    - HTML
    - markdown

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    anchorLineNos: false
    codeFences: true
    guessSyntax: true
    hl_Lines: ""
    lineAnchors: ""
    lineNoStart: 1
    lineNos: false
    lineNumbersInTable: true
    noClasses: true
    style: monokai

menu:
  main:
    - identifiers: home
      name: home
      url: /
      weight: 1
    - identifiers: blog
      name: blog
      url: /blog/
      weight: 2
    - identifiers: projects
      name: projects
      url: /projects/
      weight: 3
    - identifiers: writing
      name: writing
      url: /writing/
      weight: 4
    - identifiers: about
      name: about
      url: /about/
      weight: 5
